name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install Ruff
      run: pip install ruff
    - name: Run Ruff Linter
      run: ruff check .
    - name: Run Ruff Formatter
      run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests (Commented out until tests are written)
      run: |
        echo "Tests are disabled for now."
        # pytest --ds=config.settings

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v7
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag fivuzabackend:test
